name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  bats:
    name: BATS test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Disable git commit signing (needed for checkpoint/rollback tests)
        run: git config --global commit.gpgsign false

      - name: Run all BATS tests
        run: bats tests/scripts/
